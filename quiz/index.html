<!DOCTYPE html>
<html lang="ko">
<head>
	<meta property="og:title" content="과학사 상식 퀴즈">
	<meta property="og:description" content="세상을 바꾼 과학적 발견, 흥미진진한 퀴즈로 나의 과학 상식을 테스트해 보세요.">
	<meta property="og:image" content="https://s.pacn.ws/1/p/11t/dark-egypt-680635.11.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과학사 상식 퀴즈</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 고대 이집트 다크 테마 변수 설정 */
        :root {
            --container-bg: rgba(26, 20, 16, 0.92);
            --text-main: #e8dcc5;
            --text-muted: #a38d73;
            --accent-color: #d4af37;
            --accent-hover: #b5952f;
            --border-color: #5c4731;
            --btn-bg: #241c16;
            --btn-hover: #3b2d23;
            --correct-bg: rgba(27, 51, 32, 0.8);
            --correct-color: #81c784;
            --wrong-bg: rgba(59, 26, 26, 0.8);
            --wrong-color: #e57373;
            --shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        body {
            font-family: 'Noto Serif KR', serif;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            
            background-color: #0d0a08;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(10, 5, 0, 0.85)), url('https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/555920/ss_1c06d2262e79f8d4500ee9ec8835d7bd0eadf2e0.1920x1080.jpg?t=1772366087');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .app-container {
            background-color: var(--container-bg);
            border: 2px solid var(--accent-color);
            outline: 1px solid var(--accent-color);
            outline-offset: 4px;
            border-radius: 2px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 800px;
            padding: 50px 40px;
            position: relative;
            backdrop-filter: blur(5px);
        }

        h1, h2, h3 { color: var(--accent-color); font-weight: 700; text-align: center; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .screen { display: none; animation: fadeIn 0.5s ease; }
        .screen.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn {
            font-family: 'Noto Serif KR', serif;
            background-color: var(--accent-color);
            color: #0d0a08;
            border: 1px solid #ffdc73;
            padding: 14px 24px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s;
            display: block;
            width: 100%;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.2), 0 4px 6px rgba(0,0,0,0.5);
        }
        .btn:hover:not(:disabled) { background-color: var(--accent-hover); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); transform: translateY(-2px); }
        .btn.outline { background-color: var(--btn-bg); color: var(--accent-color); border: 1px solid var(--accent-color); box-shadow: none; }
        .btn.outline:hover:not(:disabled) { background-color: var(--btn-hover); color: #ffdc73; }
        .btn:disabled { background-color: var(--btn-bg); color: var(--text-muted); border: 1px solid var(--border-color); cursor: not-allowed; box-shadow: none; transform: none; }
        .btn-inline { width: auto; display: inline-block; margin-bottom: 0; }
        .menu-btn { font-size: 1.2em; padding: 20px; }

        /* 주제별 챕터 그리드 (1열로 넓게 표시하여 주제명이 잘 보이게 함) */
        .week-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 30px;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .progress-container { display: flex; gap: 4px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .progress-box {
            width: 22px; height: 8px; background-color: var(--btn-bg); border: 1px solid var(--border-color);
            transition: all 0.3s; border-radius: 1px;
        }
        .progress-box.current { border-color: var(--accent-color); background-color: var(--accent-color); box-shadow: 0 0 8px var(--accent-color); }
        .progress-box.correct { background-color: var(--correct-color); border-color: var(--correct-color); }
        .progress-box.wrong { background-color: var(--wrong-color); border-color: var(--wrong-color); }

        .question-text { font-size: 1.3em; margin-bottom: 30px; line-height: 1.6; text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 25px; }
        .options { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px;}
        .option-btn {
            font-family: 'Noto Serif KR', serif; background-color: var(--btn-bg); color: var(--text-main);
            border: 1px solid var(--border-color); border-radius: 2px; padding: 20px; font-size: 1.1em;
            text-align: center; cursor: pointer; transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) { background-color: var(--btn-hover); border-color: var(--accent-color); }
        .option-btn.is-correct { background-color: var(--correct-bg); border-color: var(--correct-color); color: var(--correct-color); font-weight: 700; box-shadow: inset 0 0 10px rgba(129, 199, 132, 0.2); }
        .option-btn.is-wrong { background-color: var(--wrong-bg); border-color: var(--wrong-color); color: var(--wrong-color); }
        
        .feedback-box {
            padding: 25px; border-radius: 2px; display: none; line-height: 1.6; font-size: 1em; border: 1px solid var(--border-color); margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .feedback-box.correct { border-left: 5px solid var(--correct-color); color: var(--text-main); }
        .feedback-box.wrong { border-left: 5px solid var(--wrong-color); color: var(--text-main); }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .nav-group { display: flex; gap: 10px; }

        .record-item { border-bottom: 1px dashed var(--border-color); padding: 20px 0; display: flex; justify-content: space-between; align-items: center; }
        .review-q-card { border: 1px solid var(--border-color); background-color: var(--btn-bg); padding: 20px; margin-bottom: 15px; border-radius: 2px; }
        .badge { padding: 4px 10px; font-size: 0.85em; font-weight: bold; border-radius: 2px; color: #111; }
        .badge.correct { background-color: var(--correct-color); }
        .badge.wrong { background-color: var(--wrong-color); }
        
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--btn-bg); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

		/* =========================================
           반응형 모바일 최적화 (모바일 화면 조절 - 수정본)
           ========================================= */
        @media (max-width: 600px) {
            body {
                padding: 10px;
                min-height: 100vh;
            }

            .app-container {
                padding: 20px 15px; /* 내부 여백을 더 줄여서 공간 확보 */
                border-width: 1px;
                outline-offset: 2px;
                margin-top: 10px; /* 상단 여백 추가 */
            }

            h1 {
                font-size: 2.2em !important; /* 과학사 제목 크기를 대폭 축소 */
                margin-bottom: 5px;
            }

            p {
                font-size: 0.9em; /* 부제목(History of Science...) 크기 축소 */
                margin-bottom: 20px !important;
            }

            h2 {
                font-size: 1.3em; /* 학습 주제 선택 등 중간 제목 크기 축소 */
            }

            .menu-btn {
                font-size: 1em !important;
                padding: 12px !important; /* 메인 메뉴 버튼 크기 대폭 축소 */
                margin-bottom: 10px !important;
            }

            /* 퀴즈 문제 화면 최적화 */
            .question-text {
                font-size: 1.05em; /* 문제 글자 크기 축소 */
                padding-bottom: 15px;
                margin-bottom: 15px;
                line-height: 1.5;
                word-break: keep-all; /* 이상한 들여쓰기/줄바꿈 방지 */
            }

            .option-btn {
                padding: 12px; /* O, X 선택 버튼 높이 축소 */
                font-size: 1em;
            }

            .feedback-box {
                padding: 15px;
                font-size: 0.85em; /* 해설 글씨 크기 축소 */
                margin-bottom: 15px;
            }

            /* 하단 네비게이션 버튼 최적화 */
            .nav-buttons {
                flex-direction: row; /* 다시 가로 배치로 변경 */
                gap: 5px;
                padding-top: 15px;
                margin-top: 15px;
            }
            
            .nav-group {
                display: flex;
                gap: 5px;
                flex-grow: 1; /* 우측 버튼 그룹이 공간을 더 차지하도록 */
                justify-content: flex-end;
            }

            .nav-buttons .btn {
                font-size: 0.85em; /* 하단 버튼 글씨 크기 대폭 축소 */
                padding: 8px 10px; /* 버튼 패딩 축소하여 답답함 해소 */
                margin-bottom: 0;
            }

            #quiz-title, #quiz-counter {
                font-size: 0.9em !important; /* 상단 N주차, N/16 글씨 크기 축소 */
            }
            
            .progress-container {
                margin-bottom: 15px;
                gap: 2px; /* 게이지 바 사이 간격 축소 */
            }
            .progress-box {
                width: 15px; /* 게이지 바 길이 축소 */
                height: 6px;
            }
        }
    </style>
</head>
<body>

<audio id="bgm" src="bgm.mp3" loop></audio>
<audio id="sound-correct" src="correct.mp3"></audio>
<audio id="sound-wrong" src="wrong.mp3"></audio>

<div class="app-container">
    
    <div id="home-screen" class="screen active">
        <h1 style="font-size: 4.5em; margin-bottom: 5px; color: var(--accent-color); text-shadow: 2px 2px 0px #000, 4px 4px 5px rgba(0,0,0,0.8), -1px -1px 0px rgba(255,255,255,0.3);">과학사</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 40px; font-style: italic;">History of Science : Interactive Quiz</p>
        
        <div style="max-width: 400px; margin: 0 auto;">
            <button class="btn menu-btn" onclick="switchScreen('week-select-screen')">학습 시작하기</button>
            <button class="btn menu-btn outline" onclick="showRecords()">나의 기록 열람</button>
            <button class="btn menu-btn outline" onclick="switchScreen('settings-screen')">환경 설정</button>
        </div>
    </div>

    <div id="week-select-screen" class="screen">
        <h2>학습 주제 선택</h2>
        <p style="text-align: center; color: var(--text-muted);">원하시는 주제를 선택하십시오.</p>
        <div class="week-grid" id="week-grid"></div>
        <div style="text-align: center; margin-top: 40px;">
            <button class="btn outline btn-inline" onclick="returnToHome()">← 신전으로 돌아가기</button>
        </div>
    </div>

    <div id="settings-screen" class="screen">
        <h2>환경 설정</h2>
        <div style="max-width: 400px; margin: 30px auto; text-align: center;">
            <p style="color: var(--text-muted); margin-bottom: 30px;">테마는 고대 이집트 양식으로 고정되어 있습니다.</p>
            
            <label style="display:block; margin-top: 20px; margin-bottom: 10px; font-weight: bold; color: var(--text-main);">오디오 설정</label>
            
            <div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; background-color: rgba(0,0,0,0.3); padding: 20px; border-radius: 4px; border: 1px solid var(--border-color);">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <label for="bgm-slider" style="width: 80px; text-align: left;">배경음:</label>
                    <input type="range" id="bgm-slider" min="0" max="1" step="0.1" value="0.5" onchange="updateBGMVolume(this.value)" style="flex-grow: 1; margin: 0 10px;">
                    <button id="mute-bgm-btn" class="btn outline btn-inline" style="padding: 5px 10px; font-size: 0.8em;" onclick="toggleBGMMute()">음소거</button>
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <label for="sfx-slider" style="width: 80px; text-align: left;">효과음:</label>
                    <input type="range" id="sfx-slider" min="0" max="1" step="0.1" value="0.5" onchange="updateSFXVolume(this.value)" style="flex-grow: 1; margin: 0 10px;">
                    <button id="mute-sfx-btn" class="btn outline btn-inline" style="padding: 5px 10px; font-size: 0.8em;" onclick="toggleSFXMute()">음소거</button>
                </div>
            </div>
            <label style="display:block; margin-top: 20px; margin-bottom: 15px; font-weight: bold; color: var(--wrong-color);">위험 : 데이터 관리</label>
            <button class="btn outline" style="border-color: var(--wrong-color); color: var(--wrong-color);" onclick="resetRecords()">⚠ 모든 학습 기록 파기</button>
        </div>
        <div style="text-align: center;">
            <button class="btn outline btn-inline" onclick="returnToHome()">← 신전으로 돌아가기</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px;">
            <span id="quiz-title" style="font-weight:bold; color: var(--accent-color); font-size: 1.1em;">[1] 주제명</span>
            <span id="quiz-counter" style="color: var(--accent-color); font-size: 1.1em; font-weight: bold;">1 / 16</span>
        </div>
        
        <div class="progress-container" id="progress-container"></div>
        
        <div class="question-text" id="question-text">질문 내용</div>
        <div class="options" id="options-container"></div>
        
        <div class="feedback-box" id="feedback-box">
            <strong id="feedback-title" style="display: block; margin-bottom: 12px; font-size: 1.1em;"></strong>
            <span id="feedback-rationale" style="color: var(--text-main);"></span>
        </div>

        <div class="nav-buttons">
            <button class="btn outline btn-inline" onclick="returnToHome()">학습 중단</button>
            <div class="nav-group">
                <button class="btn outline btn-inline" id="prev-btn" onclick="handlePrev()">이전 문항</button>
                <button class="btn btn-inline" id="next-btn" onclick="handleNext()" disabled>다음 문항</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1 style="margin-top: 40px;">학습 완료</h1>
        <p style="text-align: center; font-size: 1.3em; margin-bottom: 40px; color: var(--text-main);">
            총 <span id="res-total"></span>문항 중 <strong style="color: var(--accent-color); font-size: 1.5em; margin: 0 5px;"><span id="res-score"></span></strong>문항을 맞혔습니다.
        </p>
        <div style="max-width: 400px; margin: 0 auto;">
            <button class="btn" onclick="showRecords()">나의 기록에서 오답 노트 보기</button>
            <button class="btn outline" onclick="returnToHome()">신전으로 돌아가기</button>
        </div>
    </div>

    <div id="records-screen" class="screen">
        <h2>과거의 기록</h2>
        <div id="records-list" style="margin-bottom: 30px; max-height: 400px; overflow-y: auto; padding-right: 10px;"></div>
        <div style="text-align: center;">
            <button class="btn outline btn-inline" onclick="returnToHome()">← 신전으로 돌아가기</button>
        </div>
    </div>

    <div id="review-screen" class="screen">
        <h2 id="review-title">복습 내역</h2>
        <div id="review-content" style="margin-bottom: 30px; max-height: 50vh; overflow-y: auto; padding-right: 10px;"></div>
        <div style="text-align: center;">
            <button class="btn outline btn-inline" onclick="showRecords()">← 목록으로 돌아가기</button>
        </div>
    </div>

</div>

<script>
    // --- 오디오 제어 로직 (배경음/효과음 분리) ---
    const bgm = document.getElementById('bgm');
    const soundCorrect = document.getElementById('sound-correct');
    const soundWrong = document.getElementById('sound-wrong');
    
    let isBGMMuted = false;
    let isSFXMuted = false;
    let bgmStarted = false;

    // 초기 볼륨 세팅
    bgm.volume = 0.5;
    soundCorrect.volume = 0.5;
    soundWrong.volume = 0.5;

    // 배경음(BGM) 볼륨 조절
    function updateBGMVolume(vol) {
        bgm.volume = vol;
        if (vol > 0 && isBGMMuted) toggleBGMMute();
    }

    // 효과음(SFX) 볼륨 조절
    function updateSFXVolume(vol) {
        soundCorrect.volume = vol;
        soundWrong.volume = vol;
        if (vol > 0 && isSFXMuted) toggleSFXMute();
    }

    // 배경음(BGM) 음소거 토글
    function toggleBGMMute() {
        isBGMMuted = !isBGMMuted;
        bgm.muted = isBGMMuted;
        
        const muteBtn = document.getElementById('mute-bgm-btn');
        if (isBGMMuted) {
            muteBtn.textContent = '켜기';
            muteBtn.style.color = 'var(--wrong-color)';
            muteBtn.style.borderColor = 'var(--wrong-color)';
        } else {
            muteBtn.textContent = '음소거';
            muteBtn.style.color = 'var(--accent-color)';
            muteBtn.style.borderColor = 'var(--accent-color)';
            if(bgmStarted && bgm.paused) {
                 bgm.play().catch(e => console.log("자동 재생이 차단되었습니다."));
            }
        }
    }

    // 효과음(SFX) 음소거 토글
    function toggleSFXMute() {
        isSFXMuted = !isSFXMuted;
        soundCorrect.muted = isSFXMuted;
        soundWrong.muted = isSFXMuted;
        
        const muteBtn = document.getElementById('mute-sfx-btn');
        if (isSFXMuted) {
            muteBtn.textContent = '켜기';
            muteBtn.style.color = 'var(--wrong-color)';
            muteBtn.style.borderColor = 'var(--wrong-color)';
        } else {
            muteBtn.textContent = '음소거';
            muteBtn.style.color = 'var(--accent-color)';
            muteBtn.style.borderColor = 'var(--accent-color)';
        }
    }

    // 브라우저 정책 우회: 사용자가 아무 버튼이나 클릭할 때 BGM 시작 유도
    document.addEventListener('click', function initAudio() {
        if (!bgmStarted && !isBGMMuted) {
            bgm.play().then(() => {
                bgmStarted = true;
            }).catch(e => console.log("사용자 상호작용 부족으로 BGM 재생 보류됨"));
        }
    });

    // 메인 화면에서 학습 시작 시 동작
    function startApp() {
        switchScreen('week-select-screen');
    }

    
    function resetRecords() {
        if(confirm("지금까지 저장된 모든 퀴즈 기록이 영구적으로 파기됩니다. 진행하시겠습니까?")) {
            localStorage.removeItem('scienceQuizRecords');
            alert("초기화 되었습니다.");
        }
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        window.scrollTo(0, 0);
    }
    function returnToHome() { switchScreen('home-screen'); }

    // --- 교안을 바탕으로 명명된 주차별 주제 목록 ---
    const chaptersInfo = [
        { id: 1, title: "역사와 과학사" },
        { id: 2, title: "자연철학과 소피즘" },
        { id: 3, title: "에라토스테네스와 앙부일구" },
        { id: 4, title: "과학혁명의 구조" },
        { id: 5, title: "고대의 종말과 중세" },
        { id: 6, title: "중세와 르네상스" },
        { id: 7, title: "과학혁명기" },
        { id: 9, title: "과학방법론과 생리학" },
        { id: 10, title: "근대과학과 계몽주의" },

                rationale: "영국의 천문학자 에딩턴은 아인슈타인의 이론을 깊이 신봉한 상태에서 일식 관측을 주도했고, 여러 불확실한 데이터 중에서 자신의 이론적 신념(일반 상대성 이론)에 유리하게 부합하는 사진만을 의도적으로 선별해 냈습니다. 이는 '관찰은 이미 이론에 오염되어 있다(이론 의존성)'는 철학적 명제를 명백히 보여줍니다." 
            },
            { 
                q: "보어의 상보성 원리에는 난 가설을 상정하지 않는다는 뉴튼의 입장과 동등한 철학적 태도가 나타난다.", 
                options: ["O", "X"], 
                answer: "O", 
                rationale: "닐스 보어의 '상보성 원리(빛과 전자는 입자이기도 하고 파동이기도 하다)'는 인간이 측정 장비를 들이댈 때 나타나는 두 가지 모순된 현상 자체를 그냥 모순 없이 받아들이자는 태도입니다. 이는 만유인력의 본질적 원인을 찾기 포기하고 현상적 기술에 머물렀던 뉴턴의 철학적 체념(현상주의)과 매우 유사합니다." 
            }
        ]
    };

    let currentChapter = null;
    let currentQIndex = 0;
    let sessionState = []; 

    // 주차 그리드 생성 (제목 포함)
    const grid = document.getElementById('week-grid');
    chaptersInfo.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'btn outline';
        btn.style.textAlign = 'left';
        
        if(quizData[ch.id]) {
            btn.textContent = `[${ch.id}주차] ${ch.title}`;
            btn.onclick = () => startQuiz(ch);
        } else {
            btn.textContent = `[${ch.id}주차] ${ch.title} (데이터 준비중)`;
            btn.disabled = true;
        }
        grid.appendChild(btn);
    });

    function startQuiz(chapter) {
        currentChapter = chapter;
        currentQIndex = 0;
        sessionState = Array(quizData[chapter.id].length).fill(null);
        document.getElementById('quiz-title').textContent = `[${chapter.id}] ${chapter.title}`;
        switchScreen('quiz-screen');
        loadQuestion();
    }

    function renderProgress() {
        const container = document.getElementById('progress-container');
        container.innerHTML = '';
        quizData[currentChapter.id].forEach((_, i) => {
            const box = document.createElement('div');
            box.className = 'progress-box';
            if (i === currentQIndex) box.classList.add('current');
            if (sessionState[i]) {
                if (sessionState[i].isCorrect) box.classList.add('correct');
                else box.classList.add('wrong');
            }
            container.appendChild(box);
        });
    }

    function loadQuestion() {
        const qData = quizData[currentChapter.id][currentQIndex];
        const total = quizData[currentChapter.id].length;
        const currentState = sessionState[currentQIndex];

        document.getElementById('quiz-counter').textContent = `${currentQIndex + 1} / ${total}`;
        document.getElementById('question-text').textContent = `Q. ${qData.q}`;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        const feedbackBox = document.getElementById('feedback-box');
        
        qData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            
            if (currentState) {
                btn.disabled = true;
                if (opt === qData.answer) btn.classList.add('is-correct');
                if (opt === currentState.userAns && !currentState.isCorrect) btn.classList.add('is-wrong');
            } else {
                btn.onclick = () => evaluateAnswer(btn, opt); 
            }
            optionsContainer.appendChild(btn);
        });

        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');

        prevBtn.disabled = (currentQIndex === 0);

        if (currentState) {
            showFeedback(currentState.isCorrect, qData.answer, qData.rationale);
            nextBtn.disabled = false;
            nextBtn.textContent = (currentQIndex === total - 1) ? '결과 확인' : '다음 문항';
        } else {
            feedbackBox.style.display = 'none';
            feedbackBox.className = 'feedback-box'; 
            nextBtn.disabled = true;
            nextBtn.textContent = '다음 문항';
        }
        renderProgress();
    }

    function evaluateAnswer(btnElement, optionText) {
        if (sessionState[currentQIndex] !== null) return; 

        const qData = quizData[currentChapter.id][currentQIndex];
        const isCorrect = (optionText === qData.answer);
        const total = quizData[currentChapter.id].length;

        // --- 효과음 재생 ---
        if (!isSFXMuted) { // 변경된 부분
            if (isCorrect) {
                soundCorrect.currentTime = 0;
                soundCorrect.play().catch(e => console.log(e));
            } else {
                soundWrong.currentTime = 0;
                soundWrong.play().catch(e => console.log(e));
            }
        }
        // ------------------

        sessionState[currentQIndex] = {
            q: qData.q, userAns: optionText, correctAns: qData.answer,
            isCorrect: isCorrect, rationale: qData.rationale
        };
        
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.disabled = true; 
            if (btn.textContent === qData.answer) btn.classList.add('is-correct');
            else if (btn.textContent === optionText && !isCorrect) btn.classList.add('is-wrong');
        });

        showFeedback(isCorrect, qData.answer, qData.rationale);
        renderProgress();

        const nextBtn = document.getElementById('next-btn');
        nextBtn.disabled = false;
        nextBtn.textContent = (currentQIndex === total - 1) ? '결과 확인' : '다음 문항';
    }

    function showFeedback(isCorrect, answer, rationale) {
        const feedbackBox = document.getElementById('feedback-box');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackRationale = document.getElementById('feedback-rationale');
        
        if (isCorrect) {
            feedbackBox.className = 'feedback-box correct';
            feedbackTitle.style.color = 'var(--correct-color)';
            feedbackTitle.textContent = "정답입니다.";
        } else {
            feedbackBox.className = 'feedback-box wrong';
            feedbackTitle.style.color = 'var(--wrong-color)';
            feedbackTitle.textContent = `오답입니다. (답: ${answer})`;
        }
        feedbackRationale.textContent = rationale;
        feedbackBox.style.display = 'block'; 
    }

    function handleNext() {
        if (currentQIndex < quizData[currentChapter.id].length - 1) {
            currentQIndex++;
            loadQuestion();
        } else {
            finishQuiz();
        }
    }

    function handlePrev() {
        if (currentQIndex > 0) {
            currentQIndex--;
            loadQuestion();
        }
    }

    function finishQuiz() {
        const total = sessionState.length;
        const score = sessionState.filter(s => s && s.isCorrect).length;
        
        document.getElementById('res-score').textContent = score;
        document.getElementById('res-total').textContent = total;
        
        saveRecordToLocal(score, total);
        switchScreen('result-screen');
    }

    function saveRecordToLocal(score, total) {
        const completedDetails = sessionState.filter(s => s !== null);
        if (completedDetails.length === 0) return;

        const records = JSON.parse(localStorage.getItem('scienceQuizRecords')) || [];
        const record = {
            id: Date.now(), 
            week: currentChapter.id, 
            title: currentChapter.title,
            date: new Date().toLocaleString(),
            score: score, total: total, details: completedDetails
        };
        records.push(record);
        localStorage.setItem('scienceQuizRecords', JSON.stringify(records));
    }

    function showRecords() {
        switchScreen('records-screen');
        const listContainer = document.getElementById('records-list');
        listContainer.innerHTML = '';
        
        const records = JSON.parse(localStorage.getItem('scienceQuizRecords')) || [];
        
        if (records.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; color: var(--text-muted); margin-top:50px; font-style:italic;">보관된 고문서가 없습니다.</p>';
            return;
        }

        records.reverse().forEach(rec => {
            const item = document.createElement('div');
            item.className = 'record-item';
            
            const info = document.createElement('div');
            // 기록 항목에도 주제명을 노출
            info.innerHTML = `<strong style="font-size: 1.1em; color: var(--accent-color);">[${rec.week}] ${rec.title || '주제없음'}</strong><br>
                              <span style="color: var(--text-muted); font-size: 0.85em;">${rec.date}</span>
                              <div style="margin-top: 8px; font-weight: bold; color: var(--text-main);">지혜의 증명: <span style="color:var(--correct-color);">${rec.score}</span> / ${rec.total}</div>`;
            
            const revBtn = document.createElement('button');
            revBtn.className = 'btn outline btn-inline';
            revBtn.textContent = '비망록 열기';
            revBtn.onclick = () => reviewRecord(rec.id);

            item.appendChild(info);
            item.appendChild(revBtn);
            listContainer.appendChild(item);
        });
    }

    function reviewRecord(recordId) {
        switchScreen('review-screen');
        const records = JSON.parse(localStorage.getItem('scienceQuizRecords')) || [];
        const record = records.find(r => r.id === recordId);
        
        document.getElementById('review-title').textContent = `[${record.week}] ${record.title || '주제없음'} 비망록`;
        const container = document.getElementById('review-content');
        container.innerHTML = '';

        record.details.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'review-q-card';
            card.style.borderLeft = item.isCorrect ? '4px solid var(--correct-color)' : '4px solid var(--wrong-color)';
            
            const badgeClass = item.isCorrect ? 'badge correct' : 'badge wrong';
            card.innerHTML = `
                <div style="margin-bottom: 15px; line-height: 1.5;">
                    <span class="${badgeClass}">${item.isCorrect ? '정답' : '오답'}</span>
                    <strong style="font-size: 1.1em; margin-left:8px;">Q${index+1}. ${item.q}</strong>
                </div>
                <div style="margin-bottom: 12px; font-size: 0.95em; color: var(--text-muted);">
                    선택: <strong style="color:var(--text-main);">${item.userAns}</strong> &nbsp;|&nbsp; 
                    답: <strong style="color: var(--correct-color);">${item.correctAns}</strong>
                </div>
                <div style="background-color: rgba(0,0,0,0.3); padding: 15px; border-radius: 2px; font-size: 0.95em; line-height: 1.6; border: 1px solid var(--border-color);">
                    <strong style="color: var(--accent-color);">[해석]</strong> ${item.rationale}
                </div>
            `;
            container.appendChild(card);
        });
    }

</script>
</body>
</html>
